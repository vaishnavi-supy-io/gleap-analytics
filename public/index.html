<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gleap Analytics — Call Request Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    /* ── Design Tokens ──────────────────────────────────── */
    :root {
      --purple-50:  #faf5ff;
      --purple-100: #f3e8ff;
      --purple-200: #e9d5ff;
      --purple-300: #d8b4fe;
      --purple-400: #c084fc;
      --purple-500: #a855f7;
      --purple-600: #9333ea;
      --purple-700: #7e22ce;
      --purple-800: #6b21a8;
      --purple-900: #581c87;

      --ink:        #1a0a2e;
      --ink-muted:  #6b7280;
      --ink-faint:  #9ca3af;
      --white:      #ffffff;
      --surface:    #fdfcff;
      --surface-2:  #f9f5ff;
      --border:     #ede9f7;
      --border-2:   #ddd6f3;

      --green:  #10b981;
      --amber:  #f59e0b;
      --red:    #ef4444;
      --blue:   #6366f1;

      --radius-sm:  8px;
      --radius-md:  14px;
      --radius-lg:  20px;
      --radius-xl:  28px;

      --shadow-sm: 0 1px 3px rgba(88,28,135,0.06), 0 1px 2px rgba(88,28,135,0.04);
      --shadow-md: 0 4px 20px rgba(88,28,135,0.08), 0 2px 6px rgba(88,28,135,0.05);
      --shadow-lg: 0 12px 40px rgba(88,28,135,0.12), 0 4px 12px rgba(88,28,135,0.06);

      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body:    'DM Sans', -apple-system, sans-serif;
    }

    /* ── Reset & Base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--surface);
      color: var(--ink);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 240px;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      z-index: 100;
      padding: 0;
    }

    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--purple-500), var(--purple-700));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: var(--font-display);
      color: var(--white);
      font-size: 17px;
      letter-spacing: -0.2px;
      line-height: 1.2;
    }

    .logo-text span {
      display: block;
      font-family: var(--font-body);
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      font-weight: 400;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      padding: 12px 12px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 9px;
      cursor: pointer;
      color: rgba(255,255,255,0.55);
      font-size: 13.5px;
      font-weight: 400;
      transition: all 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
    .nav-item.active { background: rgba(168,85,247,0.2); color: var(--white); }
    .nav-item.active .nav-dot { background: var(--purple-400); }

    .nav-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 16px 12px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(16,185,129,0.1);
      border-radius: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    /* ── Main Content ───────────────────────────────────── */
    .main {
      margin-left: 240px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding: 20px 32px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-left h1 {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--ink);
      letter-spacing: -0.4px;
    }

    .topbar-left p {
      font-size: 12.5px;
      color: var(--ink-muted);
      margin-top: 1px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .date-picker {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--ink);
      background: var(--white);
      cursor: pointer;
    }

    .date-picker input[type="date"] {
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
    }

    .btn-primary {
      background: var(--purple-600);
      color: var(--white);
    }

    .btn-primary:hover { background: var(--purple-700); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { background: var(--purple-300); cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: transparent;
      color: var(--ink-muted);
      border: 1px solid var(--border-2);
    }

    .btn-ghost:hover { background: var(--surface-2); color: var(--ink); }

    .btn-ai {
      background: linear-gradient(135deg, var(--purple-600), var(--purple-800));
      color: var(--white);
      position: relative;
      overflow: hidden;
    }

    .btn-ai::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-ai:hover::before { opacity: 1; }
    .btn-ai:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(147,51,234,0.35); }

    /* ── Content Area ───────────────────────────────────── */
    .content {
      flex: 1;
      padding: 28px 32px;
    }

    /* ── Loading State ──────────────────────────────────── */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(253,252,255,0.92);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      gap: 20px;
    }

    .loading-spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--purple-100);
      border-top-color: var(--purple-600);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--ink);
    }

    .loading-sub {
      font-size: 13px;
      color: var(--ink-muted);
      margin-top: -12px;
    }

    /* ── KPI Cards ──────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .kpi-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    .kpi-card.purple::before { background: linear-gradient(90deg, var(--purple-500), var(--purple-700)); }
    .kpi-card.green::before  { background: linear-gradient(90deg, #10b981, #059669); }
    .kpi-card.amber::before  { background: linear-gradient(90deg, #f59e0b, #d97706); }
    .kpi-card.red::before    { background: linear-gradient(90deg, #ef4444, #dc2626); }
    .kpi-card.blue::before   { background: linear-gradient(90deg, #6366f1, #4f46e5); }

    .kpi-label {
      font-size: 11.5px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--ink-muted);
      margin-bottom: 10px;
    }

    .kpi-value {
      font-family: var(--font-display);
      font-size: 32px;
      color: var(--ink);
      line-height: 1;
      letter-spacing: -1px;
    }

    .kpi-sub {
      font-size: 12px;
      color: var(--ink-faint);
      margin-top: 6px;
    }

    .kpi-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 500;
      margin-top: 6px;
    }

    .kpi-badge.good  { background: #d1fae5; color: #065f46; }
    .kpi-badge.warn  { background: #fef3c7; color: #92400e; }
    .kpi-badge.bad   { background: #fee2e2; color: #991b1b; }
    .kpi-badge.info  { background: var(--purple-100); color: var(--purple-800); }

    /* ── Section Layouts ────────────────────────────────── */
    .section-title {
      font-family: var(--font-display);
      font-size: 17px;
      color: var(--ink);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title .badge {
      font-family: var(--font-body);
      font-size: 11px;
      background: var(--purple-100);
      color: var(--purple-700);
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .full-col { margin-bottom: 24px; }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 22px;
      box-shadow: var(--shadow-sm);
    }

    /* ── Bar Charts ─────────────────────────────────────── */
    .bar-chart { display: flex; flex-direction: column; gap: 6px; }

    .bar-row {
      display: grid;
      grid-template-columns: 90px 1fr 40px;
      align-items: center;
      gap: 10px;
      font-size: 12.5px;
    }

    .bar-label { color: var(--ink-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .bar-track {
      height: 8px;
      background: var(--surface-2);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--purple-400), var(--purple-600));
      transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .bar-fill.green  { background: linear-gradient(90deg, #34d399, #10b981); }
    .bar-fill.amber  { background: linear-gradient(90deg, #fcd34d, #f59e0b); }
    .bar-fill.purple { background: linear-gradient(90deg, var(--purple-400), var(--purple-600)); }

    .bar-count { color: var(--ink); font-weight: 500; text-align: right; }

    /* ── Agent Table ────────────────────────────────────── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }

    .data-table thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--ink-muted);
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .data-table thead th:first-child { border-radius: var(--radius-sm) 0 0 0; }
    .data-table thead th:last-child  { border-radius: 0 var(--radius-sm) 0 0; }

    .data-table tbody td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--ink);
      vertical-align: middle;
    }

    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: var(--purple-50); }

    .agent-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple-400), var(--purple-700));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: white;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .agent-cell { display: flex; align-items: center; }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .chip.open    { background: #dbeafe; color: #1d4ed8; }
    .chip.closed  { background: #d1fae5; color: #065f46; }
    .chip.urgent  { background: #fee2e2; color: #991b1b; }
    .chip.neutral { background: var(--surface-2); color: var(--ink-muted); }

    .timing-good { color: var(--green); font-weight: 500; }
    .timing-warn { color: var(--amber); font-weight: 500; }
    .timing-bad  { color: var(--red); font-weight: 500; }

    /* ── Open Tickets Feed ──────────────────────────────── */
    .ticket-feed { display: flex; flex-direction: column; gap: 10px; }

    .ticket-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .ticket-item:hover { border-color: var(--purple-200); box-shadow: var(--shadow-md); }
    .ticket-item.urgent-item { border-left: 3px solid var(--red); }
    .ticket-item.warn-item   { border-left: 3px solid var(--amber); }

    .ticket-id { font-size: 11px; color: var(--ink-faint); margin-bottom: 3px; font-weight: 500; }

    .ticket-title {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 5px;
      line-height: 1.4;
    }

    .ticket-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 12px;
      color: var(--ink-muted);
      align-items: center;
    }

    .ticket-meta-sep { color: var(--border-2); }

    .ticket-right { text-align: right; flex-shrink: 0; }

    .ticket-age {
      font-size: 11.5px;
      color: var(--ink-muted);
      white-space: nowrap;
    }

    .no-reply-badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 10.5px;
      background: #fee2e2;
      color: #991b1b;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* ── AI Report Panel ────────────────────────────────── */
    .ai-panel {
      background: linear-gradient(135deg, var(--ink) 0%, #2d1060 100%);
      border-radius: var(--radius-lg);
      padding: 28px;
      color: var(--white);
      position: relative;
      overflow: hidden;
    }

    .ai-panel::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(168,85,247,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .ai-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .ai-panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ai-icon {
      width: 36px; height: 36px;
      background: rgba(168,85,247,0.3);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .ai-panel-title h3 {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--white);
    }

    .ai-panel-title p { font-size: 12px; color: rgba(255,255,255,0.5); }

    .ai-report-content {
      font-size: 13.5px;
      line-height: 1.75;
      color: rgba(255,255,255,0.85);
      white-space: pre-wrap;
      font-family: var(--font-body);
    }

    .ai-report-content strong, .ai-report-content b {
      color: var(--white);
      font-weight: 600;
    }

    .ai-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 12px;
      text-align: center;
    }

    .ai-placeholder p { font-size: 14px; color: rgba(255,255,255,0.5); }

    /* ── Timing Card ────────────────────────────────────── */
    .timing-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .timing-card {
      background: var(--surface-2);
      border-radius: var(--radius-md);
      padding: 18px;
    }

    .timing-card h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--ink-muted);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .timing-main {
      font-family: var(--font-display);
      font-size: 26px;
      color: var(--ink);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .timing-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--ink-muted);
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }

    .timing-row:last-child { border-bottom: none; }

    /* ── Hourly Heatmap ─────────────────────────────────── */
    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      gap: 3px;
    }

    .heat-cell {
      aspect-ratio: 1;
      border-radius: 3px;
      background: var(--purple-100);
      position: relative;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .heat-cell:hover { transform: scale(1.3); z-index: 1; }

    .heat-labels {
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      gap: 3px;
      margin-top: 4px;
    }

    .heat-label {
      font-size: 9px;
      text-align: center;
      color: var(--ink-faint);
    }

    /* ── Empty State ────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
      gap: 10px;
      text-align: center;
    }

    .empty-icon { font-size: 40px; margin-bottom: 4px; }
    .empty-state h3 { font-family: var(--font-display); font-size: 18px; color: var(--ink); }
    .empty-state p  { font-size: 13px; color: var(--ink-muted); max-width: 280px; }

    /* ── Toast Notifications ────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--ink);
      color: var(--white);
      padding: 12px 18px;
      border-radius: var(--radius-md);
      font-size: 13px;
      box-shadow: var(--shadow-lg);
      z-index: 999;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s;
      max-width: 320px;
    }

    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-left: 3px solid var(--green); }
    #toast.error   { border-left: 3px solid var(--red); }

    /* ── Page Transition ────────────────────────────────── */
    .page { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--purple-300); }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 1100px) {
      .two-col   { grid-template-columns: 1fr; }
      .three-col { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 768px) {
      .sidebar { width: 200px; }
      .main    { margin-left: 200px; }
      .three-col { grid-template-columns: 1fr; }
      .topbar { padding: 14px 20px; }
      .content { padding: 20px; }
    }

    /* ── Divider ────────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 24px 0; }

    /* ── Inline Spinner ─────────────────────────────────── */
    .spin-sm {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    .company-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .company-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
    }

    .company-chip-name { font-weight: 500; color: var(--ink); }
    .company-chip-count { font-size: 12px; color: var(--purple-600); font-weight: 600; }
  </style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Fetching call requests…</div>

</div>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <a class="logo-mark" href="#">
      <div class="logo-icon">📞</div>
      <div class="logo-text">
        Gleap Analytics
        <span>Call Request Intelligence</span>
      </div>
    </a>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-label">Dashboard</div>
    <button class="nav-item active" onclick="showPage('overview')" id="nav-overview">

    </button>
    <button class="nav-item" onclick="showPage('agents')" id="nav-agents">
      <span class="nav-dot"></span> Agent Performance
    </button>
    <button class="nav-item" onclick="showPage('open')" id="nav-open">
      <span class="nav-dot"></span> Open Requests
    </button>
    <button class="nav-item" onclick="showPage('trends')" id="nav-trends">

    </button>

    </button>

    <div class="nav-label" style="margin-top:8px">AI Reports</div>
    <button class="nav-item" onclick="showPage('ai')" id="nav-ai">
      <span class="nav-dot"></span> AI Team Report
    </button>
  </nav>

  <div class="sidebar-footer">
    <div class="status-pill">
      <div class="status-dot"></div>
      <span id="sidebarStatus">Ready</span>
    </div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <h1 id="pageTitle">Overview</h1>
      <p id="pageSubtitle">Loading data…</p>
    </div>
    <div class="topbar-right">
      <div class="date-picker">
        <span style="color:var(--ink-muted);font-size:12px">From</span>
        <input type="date" id="startDate" />
      </div>
      <div class="date-picker">
        <span style="color:var(--ink-muted);font-size:12px">To</span>
        <input type="date" id="endDate" />
      </div>
      <button class="btn btn-ghost" onclick="refreshData()">↺ Refresh</button>
      <button class="btn btn-primary" onclick="refreshData()">
        Fetch Data
      </button>
    </div>
  </header>

  <!-- Content -->
  <div class="content" id="mainContent"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────
let STATE = {
  stats: null,
  aiReport: null,
  currentPage: 'overview',
  loading: false,
};

// ── Init ───────────────────────────────────────────────────
(function init() {
  const now = new Date();
  const firstOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  document.getElementById('startDate').value = firstOfMonth.toISOString().slice(0,10);
  document.getElementById('endDate').value   = now.toISOString().slice(0,10);

  // Check if we have a real backend or use demo mode
  detectBackend();
})();

async function detectBackend() {
  try {
    const res = await fetch('/api/health');
    if (res.ok) {
      refreshData();
    } else {
      loadDemoData();
    }
  } catch {
    loadDemoData();
  }
}

// ── Demo data for GitHub preview / no-backend ──────────────
function loadDemoData() {
  const demo = generateDemoStats();
  STATE.stats = demo;
  hideLoading();
  renderPage('overview');
  showToast('Running in demo mode — connect backend for live data', 'info');
  document.getElementById('pageSubtitle').textContent = 'Demo mode — Mar 1 → Apr 8, 2026';
  document.getElementById('sidebarStatus').textContent = 'Demo Mode';
}

function generateDemoStats() {
  const agents = [
    { name: 'Sarah Chen',    handled:24, open:3, closed:21, replied:22, slaBreached:1, avgAssign:8,  avgClose:210 },
    { name: 'James Okafor',  handled:18, open:5, closed:13, replied:15, slaBreached:2, avgAssign:12, avgClose:340 },
    { name: 'Priya Sharma',  handled:15, open:2, closed:13, replied:14, slaBreached:0, avgAssign:6,  avgClose:180 },
    { name: 'Tom Reeves',    handled:12, open:4, closed:8,  replied:10, slaBreached:3, avgAssign:22, avgClose:520 },
    { name: 'Aisha Ndiaye',  handled:9,  open:1, closed:8,  replied:9,  slaBreached:0, avgAssign:5,  avgClose:155 },
    { name: 'Unassigned',    handled:7,  open:7, closed:0,  replied:0,  slaBreached:4, avgAssign:null, avgClose:null },
  ];

  const openTickets = [
    { bugId:'3421', contact:'Lena Fischer', company:'Acme Corp', phone:'+49 30 1234567', agent:'James Okafor', status:'OPEN', createdAt:'2026-03-28T09:14:00Z', hasAgentReply:false, aiSummary:'Customer requesting a demo call for enterprise plan evaluation' },
    { bugId:'3445', contact:'Rahul Verma', company:'TechBridge India', phone:'+91 9876543210', agent:'Tom Reeves', status:'OPEN', createdAt:'2026-04-01T11:30:00Z', hasAgentReply:true, aiSummary:'Interested in pricing for team of 50+ users' },
    { bugId:'3461', contact:'Marco Rossi', company:'Innovatech SRL', phone:'+39 02 9876543', agent:'Unassigned', status:'OPEN', createdAt:'2026-04-03T14:22:00Z', hasAgentReply:false, aiSummary:'Urgent request for call — potential €120k deal' },
    { bugId:'3478', contact:'Yuki Tanaka', company:'Global Nexus KK', phone:'+81 3 1234 5678', agent:'James Okafor', status:'OPEN', createdAt:'2026-04-05T08:05:00Z', hasAgentReply:false, aiSummary:'Partnership inquiry — wants to resell product in Japan' },
    { bugId:'3489', contact:'Sophie Laurent', company:'Meridian Group', phone:'+33 1 23 45 67 89', agent:'Unassigned', status:'OPEN', createdAt:'2026-04-07T16:40:00Z', hasAgentReply:false, aiSummary:'Follow-up on previous call — ready to purchase' },
  ];

  const daily = [];
  for (let d = 1; d <= 38; d++) {
    const date = new Date(2026, 2, d < 32 ? d : d - 31 + 0, 0, 0, 0);
    if (date > new Date()) break;
    const iso = date.toISOString().slice(0,10);
    daily.push({ day: iso, count: Math.floor(Math.random() * 8) + 1 });
  }

  const dow = [
    { day:'Monday', count:18 }, { day:'Tuesday', count:22 }, { day:'Wednesday', count:19 },
    { day:'Thursday', count:24 }, { day:'Friday', count:15 }, { day:'Saturday', count:3 }, { day:'Sunday', count:1 },
  ];

  const hourly = [
    {hour:8,count:4},{hour:9,count:12},{hour:10,count:18},{hour:11,count:15},
    {hour:12,count:8},{hour:13,count:6},{hour:14,count:14},{hour:15,count:16},
    {hour:16,count:11},{hour:17,count:7},{hour:18,count:3},{hour:19,count:1},
  ];

  const topCompanies = [
    {name:'Acme Corp', count:5}, {name:'TechBridge India', count:4}, {name:'Innovatech SRL', count:3},
    {name:'Global Nexus KK', count:3}, {name:'Meridian Group', count:2}, {name:'Sunrise Ventures', count:2},
    {name:'DataFlow GmbH', count:2}, {name:'NexGen Systems', count:1},
  ];

  return {
    total:85, openCount:22, closedCount:63,
    unassigned:7, withReply:71, slaBreached:10, withCompany:68, withPhone:52,
    avgAssign:11.4, avgClose:276,
    avgAssignFmt:'11 min', avgCloseFmt:'4.6 hrs',
    daily, dow, hourly, agents, topCompanies, openTickets,
  };
}

// ── Data fetching ──────────────────────────────────────────
async function refreshData() {
  if (STATE.loading) return;
  STATE.loading = true;
  showLoading('Fetching call requests…', 'Scanning Gleap tickets in date range');

  const start = document.getElementById('startDate').value;
  const end   = document.getElementById('endDate').value + 'T23:59:59Z';

  try {
    const res  = await fetch(`/api/analytics?start=${start}T00:00:00Z&end=${end}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    STATE.stats = data.stats;
    STATE.aiReport = null;
    hideLoading();
    renderPage(STATE.currentPage);
    const count = data.stats.total;
    showToast(`✓ Loaded ${count} call requests`, 'success');
    document.getElementById('pageSubtitle').textContent = `${start} → ${end.slice(0,10)} · ${count} requests`;
    document.getElementById('sidebarStatus').textContent = 'Live Data';
  } catch (e) {
    hideLoading();
    showToast('Failed to fetch: ' + e.message, 'error');
    if (!STATE.stats) loadDemoData();
  }
  STATE.loading = false;
}

// ── Navigation ─────────────────────────────────────────────
function showPage(page) {
  STATE.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + page)?.classList.add('active');

  const titles = {
    overview: 'Overview', agents: 'Agent Performance',
    open: 'Open Requests', trends: 'Trends & Volume',
    companies: 'Companies', ai: 'AI Team Report',
  };
  document.getElementById('pageTitle').textContent = titles[page] || page;

  if (STATE.stats) renderPage(page);
}

function renderPage(page) {
  if (!STATE.stats) return;
  const el = document.getElementById('mainContent');
  switch (page) {
    case 'overview':  el.innerHTML = renderOverview();   break;
    case 'agents':    el.innerHTML = renderAgents();     break;
    case 'open':      el.innerHTML = renderOpen();       break;
    case 'trends':    el.innerHTML = renderTrends();     break;
    case 'companies': el.innerHTML = renderCompanies();  break;
    case 'ai':        el.innerHTML = renderAI();         break;
  }
  el.classList.remove('page');
  void el.offsetWidth;
  el.classList.add('page');

  // Post-render setup
  if (page === 'trends') setupHeatmap();
  if (page === 'ai' && !STATE.aiReport) {
    // Auto-trigger if no report yet
  }
}

// ── Overview ───────────────────────────────────────────────
function renderOverview() {
  const s = STATE.stats;
  const closedPct = s.total ? Math.round(s.closedCount/s.total*100) : 0;
  const repliedPct = s.total ? Math.round(s.withReply/s.total*100) : 0;
  const assignClass = s.avgAssign === null ? '' : s.avgAssign < 15 ? 'good' : s.avgAssign < 30 ? 'warn' : 'bad';
  const closeHrs = s.avgClose ? s.avgClose/60 : null;
  const closeClass = closeHrs === null ? '' : closeHrs < 4 ? 'good' : closeHrs < 8 ? 'warn' : 'bad';

  return `
  <div class="kpi-grid">
    <div class="kpi-card purple">
      <div class="kpi-label">Total Call Requests</div>
      <div class="kpi-value">${s.total}</div>
      <div class="kpi-sub">${s.openCount} open · ${s.closedCount} closed</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">Resolution Rate</div>
      <div class="kpi-value">${closedPct}%</div>
      <div class="kpi-badge ${closedPct >= 80 ? 'good' : closedPct >= 60 ? 'warn' : 'bad'}">${closedPct >= 80 ? '✓ On Track' : closedPct >= 60 ? '⚠ Needs Work' : '✗ Below Target'}</div>
    </div>
    <div class="kpi-card amber">
      <div class="kpi-label">Avg Assign Time</div>
      <div class="kpi-value">${s.avgAssignFmt}</div>
      <div class="kpi-badge ${assignClass}">${s.avgAssign !== null ? (s.avgAssign < 15 ? '✓ Under 15 min' : '⚠ Over benchmark') : 'N/A'}</div>
    </div>
    <div class="kpi-card blue">
      <div class="kpi-label">Avg Close Time</div>
      <div class="kpi-value">${s.avgCloseFmt}</div>
      <div class="kpi-badge ${closeClass}">${closeHrs !== null ? (closeHrs < 4 ? '✓ Under 4 hrs' : '⚠ Over benchmark') : 'N/A'}</div>
    </div>
    <div class="kpi-card red">
      <div class="kpi-label">Unassigned</div>
      <div class="kpi-value">${s.unassigned}</div>
      <div class="kpi-badge ${s.unassigned === 0 ? 'good' : s.unassigned < 5 ? 'warn' : 'bad'}">${s.unassigned === 0 ? '✓ All assigned' : '⚠ Needs attention'}</div>
    </div>
    <div class="kpi-card purple">
      <div class="kpi-label">Agent Replied</div>
      <div class="kpi-value">${s.withReply}</div>
      <div class="kpi-sub">${repliedPct}% reply rate</div>
    </div>
    <div class="kpi-card red">
      <div class="kpi-label">SLA Breached</div>
      <div class="kpi-value">${s.slaBreached}</div>
      <div class="kpi-badge ${s.slaBreached === 0 ? 'good' : 'bad'}">${s.slaBreached === 0 ? '✓ Clean' : '✗ Breached'}</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">With Phone</div>
      <div class="kpi-value">${s.withPhone}</div>
      <div class="kpi-sub">of ${s.total} requesters</div>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="section-title">Response Timings <span class="badge">vs benchmarks</span></div>
      <div class="timing-grid">
        <div class="timing-card">
          <h4>⚡ Assign Time</h4>
          <div class="timing-main">${s.avgAssignFmt}</div>
          <div class="timing-row"><span>Benchmark</span><span style="color:var(--green)">< 15 min</span></div>
          <div class="timing-row"><span>Your avg</span><span class="${assignClass === 'good' ? 'timing-good' : assignClass === 'warn' ? 'timing-warn' : 'timing-bad'}">${s.avgAssignFmt}</span></div>
        </div>
        <div class="timing-card">
          <h4>🔒 Close Time</h4>
          <div class="timing-main">${s.avgCloseFmt}</div>
          <div class="timing-row"><span>Benchmark</span><span style="color:var(--green)">< 4 hrs</span></div>
          <div class="timing-row"><span>Your avg</span><span class="${closeClass === 'good' ? 'timing-good' : closeClass === 'warn' ? 'timing-warn' : 'timing-bad'}">${s.avgCloseFmt}</span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Top Agents <span class="badge">by volume</span></div>
      <div class="bar-chart">
        ${(s.agents || []).slice(0,6).map(a => {
          const max = Math.max(...(s.agents||[]).map(x => x.handled));
          const pct = max ? (a.handled/max*100) : 0;
          return `
          <div class="bar-row">
            <div class="bar-label" title="${a.name}">${a.name}</div>
            <div class="bar-track"><div class="bar-fill ${a.name === 'Unassigned' ? 'amber' : 'purple'}" style="width:${pct}%"></div></div>
            <div class="bar-count">${a.handled}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <div class="full-col">
    <div class="card">
      <div class="section-title">Recent Open Requests <span class="badge">${s.openCount} total</span></div>
      ${renderOpenTicketsMini(s.openTickets?.slice(0,4))}
      ${s.openCount > 4 ? `<div style="margin-top:12px;text-align:center"><button class="btn btn-ghost" onclick="showPage('open')">View all ${s.openCount} open requests →</button></div>` : ''}
    </div>
  </div>
  `;
}

// ── Agents Page ────────────────────────────────────────────
function renderAgents() {
  const s = STATE.stats;
  const agents = s.agents || [];

  return `
  <div class="full-col">
    <div class="card">
      <div class="section-title">Agent Performance <span class="badge">${agents.length} agents</span></div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Agent</th>
            <th>Handled</th>
            <th>Open</th>
            <th>Closed</th>
            <th>Replied</th>
            <th>SLA Breach</th>
            <th>Avg Assign</th>
            <th>Avg Close</th>
          </tr>
        </thead>
        <tbody>
          ${agents.map(a => {
            const assignClass = a.avgAssign === null ? '' : a.avgAssign < 15 ? 'timing-good' : a.avgAssign < 30 ? 'timing-warn' : 'timing-bad';
            const closeHrs = a.avgClose ? a.avgClose/60 : null;
            const closeClass = closeHrs === null ? '' : closeHrs < 4 ? 'timing-good' : closeHrs < 8 ? 'timing-warn' : 'timing-bad';
            const initials = a.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
            const isUnassigned = a.name === 'Unassigned';
            return `
            <tr>
              <td>
                <div class="agent-cell">
                  <div class="agent-avatar" style="${isUnassigned ? 'background:linear-gradient(135deg,#9ca3af,#6b7280)' : ''}">${initials}</div>
                  <span style="font-weight:500">${a.name}</span>
                </div>
              </td>
              <td><strong>${a.handled}</strong></td>
              <td><span class="chip open">${a.open}</span></td>
              <td><span class="chip closed">${a.closed}</span></td>
              <td>${a.replied}</td>
              <td>${a.slaBreached > 0 ? `<span class="chip urgent">${a.slaBreached}</span>` : `<span style="color:var(--green)">0</span>`}</td>
              <td class="${assignClass}">${a.avgAssign !== null ? fmtMins(a.avgAssign) : '—'}</td>
              <td class="${closeClass}">${a.avgClose !== null ? fmtMins(a.avgClose) : '—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="section-title">Handle Volume</div>
      <div class="bar-chart">
        ${agents.map(a => {
          const max = Math.max(...agents.map(x=>x.handled));
          const pct = max ? (a.handled/max*100) : 0;
          return `
          <div class="bar-row">
            <div class="bar-label">${a.name.split(' ')[0]}</div>
            <div class="bar-track"><div class="bar-fill purple" style="width:${pct}%"></div></div>
            <div class="bar-count">${a.handled}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card">
      <div class="section-title">Open Requests per Agent</div>
      <div class="bar-chart">
        ${agents.map(a => {
          const max = Math.max(...agents.map(x=>x.open), 1);
          const pct = (a.open/max*100);
          const color = a.open > 5 ? 'amber' : 'green';
          return `
          <div class="bar-row">
            <div class="bar-label">${a.name.split(' ')[0]}</div>
            <div class="bar-track"><div class="bar-fill ${color}" style="width:${pct}%"></div></div>
            <div class="bar-count">${a.open}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>
  `;
}

// ── Open Tickets ───────────────────────────────────────────
function renderOpen() {
  const s = STATE.stats;
  const tickets = s.openTickets || [];
  if (!tickets.length) {
    return `<div class="card"><div class="empty-state"><div class="empty-icon">✅</div><h3>All Clear!</h3><p>No open call requests. The team is on top of everything.</p></div></div>`;
  }

  return `
  <div class="full-col">
    <div class="section-title">Open Call Requests <span class="badge">${tickets.length} pending</span></div>
    <div class="ticket-feed">
      ${tickets.map(t => {
        const age = getAge(t.createdAt);
        const isUrgent = !t.hasAgentReply && getAgeHours(t.createdAt) > 4;
        const isWarn   = !t.hasAgentReply && getAgeHours(t.createdAt) > 1;
        return `
        <div class="ticket-item ${isUrgent ? 'urgent-item' : isWarn ? 'warn-item' : ''}">
          <div>
            <div class="ticket-id">#${t.bugId || t.id?.slice(-6) || '—'}</div>
            <div class="ticket-title">${escHtml(t.title || t.aiSummary?.slice(0,80) || 'Call Request')}</div>
            <div class="ticket-meta">
              <span>👤 ${escHtml(t.contact)}</span>
              ${t.company ? `<span class="ticket-meta-sep">·</span><span>🏢 ${escHtml(t.company)}</span>` : ''}
              ${t.phone ? `<span class="ticket-meta-sep">·</span><span>📞 ${escHtml(t.phone)}</span>` : ''}
              <span class="ticket-meta-sep">·</span>
              <span>🧑 ${escHtml(t.agent)}</span>
            </div>
            ${t.aiSummary ? `<div style="margin-top:6px;font-size:12px;color:var(--ink-muted);line-height:1.5">${escHtml(t.aiSummary.slice(0,140))}</div>` : ''}
          </div>
          <div class="ticket-right">
            <div class="ticket-age">${age} old</div>
            ${!t.hasAgentReply ? '<div class="no-reply-badge">No reply yet</div>' : '<div style="font-size:11px;color:var(--green);margin-top:6px">✓ Replied</div>'}
            ${t.agent === 'Unassigned' ? '<div style="font-size:11px;color:var(--red);margin-top:4px">⚠ Unassigned</div>' : ''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>
  `;
}

// ── Trends ─────────────────────────────────────────────────
function renderTrends() {
  const s = STATE.stats;

  return `
  <div class="two-col">
    <div class="card">
      <div class="section-title">Daily Volume</div>
      <div class="bar-chart">
        ${(s.daily || []).map(d => {
          const max = Math.max(...(s.daily||[]).map(x=>x.count), 1);
          const pct = d.count/max*100;
          return `
          <div class="bar-row" style="grid-template-columns:100px 1fr 30px">
            <div class="bar-label">${d.day.slice(5)}</div>
            <div class="bar-track"><div class="bar-fill purple" style="width:${pct}%"></div></div>
            <div class="bar-count">${d.count}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card">
      <div class="section-title">By Day of Week</div>
      <div class="bar-chart">
        ${(s.dow || []).map(d => {
          const max = Math.max(...(s.dow||[]).map(x=>x.count), 1);
          const pct = d.count/max*100;
          const color = ['Saturday','Sunday'].includes(d.day) ? 'amber' : 'purple';
          return `
          <div class="bar-row">
            <div class="bar-label">${d.day.slice(0,3)}</div>
            <div class="bar-track"><div class="bar-fill ${color}" style="width:${pct}%"></div></div>
            <div class="bar-count">${d.count}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <div class="full-col">
    <div class="card">
      <div class="section-title">Hourly Activity <span class="badge">UTC</span></div>
      <div class="heatmap-grid" id="heatmapGrid"></div>
      <div class="heat-labels">
        ${Array.from({length:24},(_,i)=>`<div class="heat-label">${i}</div>`).join('')}
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--ink-muted)">
        💡 Darker = more requests that hour. Best time to have agents ready.
      </div>
    </div>
  </div>
  `;
}

function setupHeatmap() {
  const s = STATE.stats;
  const grid = document.getElementById('heatmapGrid');
  if (!grid) return;
  const hourlyMap = {};
  (s.hourly || []).forEach(h => hourlyMap[h.hour] = h.count);
  const max = Math.max(...Object.values(hourlyMap), 1);
  let html = '';
  for (let h = 0; h < 24; h++) {
    const count = hourlyMap[h] || 0;
    const intensity = count / max;
    const alpha = 0.08 + intensity * 0.92;
    const title = `${h}:00 — ${count} request${count!==1?'s':''}`;
    html += `<div class="heat-cell" title="${title}" style="background:rgba(147,51,234,${alpha.toFixed(2)})"></div>`;
  }
  grid.innerHTML = html;
}

// ── Companies ──────────────────────────────────────────────
function renderCompanies() {
  const s = STATE.stats;
  const companies = s.topCompanies || [];
  if (!companies.length) {
    return `<div class="card"><div class="empty-state"><div class="empty-icon">🏢</div><h3>No company data</h3><p>Company information wasn't captured in call requests.</p></div></div>`;
  }

  return `
  <div class="full-col card">
    <div class="section-title">Top Companies Requesting Calls <span class="badge">${companies.length} companies</span></div>
    <div class="bar-chart" style="margin-bottom:24px">
      ${companies.slice(0,10).map(c => {
        const max = companies[0]?.count || 1;
        const pct = c.count/max*100;
        return `
        <div class="bar-row" style="grid-template-columns:180px 1fr 40px">
          <div class="bar-label" title="${c.name}">${c.name}</div>
          <div class="bar-track"><div class="bar-fill purple" style="width:${pct}%"></div></div>
          <div class="bar-count">${c.count}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="divider"></div>
    <div class="section-title" style="margin-bottom:12px">All Companies</div>
    <div class="company-grid">
      ${companies.map(c => `
        <div class="company-chip">
          <span class="company-chip-name">${escHtml(c.name)}</span>
          <span class="company-chip-count">${c.count}</span>
        </div>`).join('')}
    </div>
  </div>
  `;
}

// ── AI Report ──────────────────────────────────────────────
function renderAI() {
  return `
  <div class="full-col">
    <div class="ai-panel">
      <div class="ai-panel-header">
        <div class="ai-panel-title">
          <div class="ai-icon">🤖</div>
          <div>
            <h3>AI Team Lead Report</h3>
            <p>Powered by Claude Sonnet 4.6 via OpenRouter</p>
          </div>
        </div>
        <button class="btn btn-ai" onclick="generateAIReport()" id="aiBtn">
          ${STATE.aiReport ? '↺ Regenerate Report' : '✦ Generate Report'}
        </button>
      </div>

      <div id="aiReportBody">
        ${STATE.aiReport
          ? `<div class="ai-report-content">${formatAIReport(STATE.aiReport)}</div>`
          : `<div class="ai-placeholder">
              <div style="font-size:48px">✦</div>
              <p>Click "Generate Report" to get a focused, data-driven analysis from Claude Sonnet 4.6 — covering team health, urgent open requests, agent performance, and a 5-point action plan.</p>
            </div>`
        }
      </div>
    </div>
  </div>
  `;
}

async function generateAIReport() {
  const btn = document.getElementById('aiBtn');
  if (!btn || !STATE.stats) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin-sm"></span> Generating…';
  document.getElementById('aiReportBody').innerHTML = `
    <div class="ai-placeholder">
      <div class="loading-spinner" style="border-color:rgba(255,255,255,0.2);border-top-color:white"></div>
      <p>Claude is reading your data and writing the report…</p>
    </div>`;

  try {
    const res  = await fetch('/api/ai-report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stats: STATE.stats }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    STATE.aiReport = data.report;
    document.getElementById('aiReportBody').innerHTML = `<div class="ai-report-content">${formatAIReport(data.report)}</div>`;
    btn.innerHTML = '↺ Regenerate Report';
  } catch (e) {
    document.getElementById('aiReportBody').innerHTML = `<div class="ai-placeholder"><p style="color:#f87171">Error: ${e.message}<br>Make sure the backend is running and OPENROUTER_KEY is set.</p></div>`;
    btn.innerHTML = '✦ Generate Report';
  }
  btn.disabled = false;
}

function formatAIReport(text) {
  return escHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^(#{1,3} .+)$/gm, '<strong style="font-size:15px">$1</strong>')
    .replace(/\n/g, '<br>');
}

// ── Helpers ────────────────────────────────────────────────
function renderOpenTicketsMini(tickets) {
  if (!tickets || !tickets.length) return '<div style="padding:20px;text-align:center;color:var(--ink-muted);font-size:13px">✅ No open requests</div>';
  return `<div class="ticket-feed">${tickets.map(t => {
    const age = getAge(t.createdAt);
    return `
    <div class="ticket-item ${!t.hasAgentReply ? 'warn-item' : ''}">
      <div>
        <div class="ticket-id">#${t.bugId || '—'}</div>
        <div class="ticket-title">${escHtml(t.contact)} ${t.company ? `· ${escHtml(t.company)}` : ''}</div>
        <div class="ticket-meta"><span>🧑 ${escHtml(t.agent)}</span>${t.phone ? `<span class="ticket-meta-sep">·</span><span>📞 ${escHtml(t.phone)}</span>` : ''}</div>
        ${t.aiSummary ? `<div style="margin-top:5px;font-size:12px;color:var(--ink-muted)">${escHtml(t.aiSummary.slice(0,100))}</div>` : ''}
      </div>
      <div class="ticket-right">
        <div class="ticket-age">${age}</div>
        ${!t.hasAgentReply ? '<div class="no-reply-badge">No reply</div>' : ''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function fmtMins(m) {
  if (m === null || m === undefined) return '—';
  if (m < 1)    return '<1 min';
  if (m < 60)   return `${Math.round(m)} min`;
  if (m < 1440) return `${(m/60).toFixed(1)} hrs`;
  return `${(m/1440).toFixed(1)} days`;
}

function getAge(isoStr) {
  if (!isoStr) return '—';
  const diff = (Date.now() - new Date(isoStr)) / 60000;
  return fmtMins(diff);
}

function getAgeHours(isoStr) {
  if (!isoStr) return 0;
  return (Date.now() - new Date(isoStr)) / 3600000;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showLoading(text, sub) {
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.querySelector('.loading-text').textContent = text;
  document.getElementById('loadingSubText').textContent = sub;
}

function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3500);
}
</script>
